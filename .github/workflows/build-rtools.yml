name: Build Portable Rtools

on:
  workflow_dispatch:
    inputs:
      rtools_version:
        description: 'Rtools version (43, 44, or 45)'
        required: true
        default: '45'
        type: choice
        options:
          - '43'
          - '44'
          - '45'

concurrency:
  group: build-rtools
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      rtools_version: ${{ github.event.inputs.rtools_version }}
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - id: resolve
        run: |
          RT="${{ github.event.inputs.rtools_version }}"
          # All Rtools versions support both x64 and aarch64
          MATRIX='[{"arch":"x64","runner":"windows-latest"},{"arch":"aarch64","runner":"windows-11-arm"}]'
          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT
          echo "Building Rtools$RT: $MATRIX"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve Rtools installer filename
        id: rtools-info
        shell: pwsh
        run: |
          $versions = Get-Content versions.json -Raw | ConvertFrom-Json
          $rt = "${{ needs.prepare.outputs.rtools_version }}"
          $arch = "${{ matrix.arch }}"
          $file = if ($arch -eq "aarch64") { $versions.rtools.$rt.aarch64.file } else { $versions.rtools.$rt.x64.file }
          "installer=$file" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Cache extracted Rtools
        id: cache
        uses: actions/cache@v4
        with:
          path: portable-rtools${{ needs.prepare.outputs.rtools_version }}-win-${{ matrix.arch }}
          key: rtools-${{ steps.rtools-info.outputs.installer }}

      - name: Build portable Rtools
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          .\build.ps1 -RtoolsOnly -RtoolsVersion "${{ needs.prepare.outputs.rtools_version }}" -Architecture "${{ matrix.arch }}"

      - name: Archive from cache
        if: steps.cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $outputName = "portable-rtools${{ needs.prepare.outputs.rtools_version }}-win-${{ matrix.arch }}"
          $zipFile = "${outputName}.zip"
          if (Test-Path $zipFile) { Remove-Item $zipFile }
          $null = & 7z a -tzip -mx=5 $zipFile $outputName 2>&1
          $hash = (Get-FileHash -Algorithm SHA256 $zipFile).Hash.ToLower()
          "${hash}  ${zipFile}" | Out-File -FilePath "${zipFile}.sha256" -Encoding ASCII
          Write-Host "Archived from cache: $zipFile"

      - name: Test portable Rtools
        shell: pwsh
        run: |
          .\tests\run-rtools-tests.ps1 "portable-rtools${{ needs.prepare.outputs.rtools_version }}-win-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: portable-rtools${{ needs.prepare.outputs.rtools_version }}-win-${{ matrix.arch }}
          path: |
            portable-rtools*-win-${{ matrix.arch }}.zip
            portable-rtools*-win-${{ matrix.arch }}.zip.sha256
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: portable-rtools${{ needs.prepare.outputs.rtools_version }}-win-x64
          path: artifacts/

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: portable-rtools${{ needs.prepare.outputs.rtools_version }}-win-aarch64
          path: artifacts/

      - name: Generate release body
        run: |
          RT="${{ needs.prepare.outputs.rtools_version }}"
          HAS_ARM64=false
          [ -f "artifacts/portable-rtools${RT}-win-aarch64.zip" ] && HAS_ARM64=true

          X64_SHA=$(cut -d' ' -f1 "artifacts/portable-rtools${RT}-win-x64.zip.sha256" 2>/dev/null || echo "n/a")
          [ "$HAS_ARM64" = "true" ] && ARM_SHA=$(cut -d' ' -f1 "artifacts/portable-rtools${RT}-win-aarch64.zip.sha256" 2>/dev/null || echo "n/a")

          {
            echo "## Portable Rtools${RT} for Windows"
            echo ""
            echo "Standalone portable Rtools toolchain. Use with portable R or a system R installation for source package compilation."
            echo ""
            echo "### Downloads"
            echo "| Architecture | File | SHA256 |"
            echo "|-------------|------|--------|"
            echo "| Windows x64 | \`portable-rtools${RT}-win-x64.zip\` | \`${X64_SHA}\` |"
            if [ "$HAS_ARM64" = "true" ]; then
              echo "| Windows ARM64 | \`portable-rtools${RT}-win-aarch64.zip\` | \`${ARM_SHA}\` |"
            fi
            echo ""
            echo "### Quick Install"
            echo "\`\`\`powershell"
            echo "Invoke-WebRequest -Uri \"https://github.com/portable-r/portable-rtools/releases/download/rtools${RT}/portable-rtools${RT}-win-x64.zip\" -OutFile rtools.zip"
            echo "Expand-Archive rtools.zip -DestinationPath ."
            echo "\`\`\`"
            echo ""
            echo "### Usage with R"
            echo ""
            echo "Add the toolchain to R's PATH via \`Renviron.site\`:"
            echo "\`\`\`"
            echo "PATH=\"/path/to/portable-rtools${RT}-win-x64/x86_64-w64-mingw32.static.posix/bin;/path/to/portable-rtools${RT}-win-x64/usr/bin;\${PATH}\""
            echo "\`\`\`"
            echo ""
            echo "Or use the **R + Rtools** bundle which configures this automatically."
          } > release-body.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rtools${{ needs.prepare.outputs.rtools_version }}
          name: Rtools${{ needs.prepare.outputs.rtools_version }}
          files: artifacts/*
          body_path: release-body.md
