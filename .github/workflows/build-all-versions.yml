name: Build All R Versions

on:
  workflow_dispatch:
    inputs:
      include_rtools:
        description: 'Also build R+Rtools bundles'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (build but skip release)'
        type: boolean
        default: false

concurrency:
  group: build-all
  cancel-in-progress: false

jobs:
  # ── R 4.3.x ─────────────────────────────────────────────────────────────

  build-4_3_0:
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.3.0'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_3_1:
    needs: build-4_3_0
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.3.1'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_3_2:
    needs: build-4_3_1
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.3.2'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_3_3:
    needs: build-4_3_2
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.3.3'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  # ── R 4.4.x ─────────────────────────────────────────────────────────────

  build-4_4_0:
    needs: build-4_3_3
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.4.0'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_4_1:
    needs: build-4_4_0
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.4.1'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_4_2:
    needs: build-4_4_1
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.4.2'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_4_3:
    needs: build-4_4_2
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.4.3'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  # ── R 4.5.x ─────────────────────────────────────────────────────────────

  build-4_5_0:
    needs: build-4_4_3
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.5.0'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_5_1:
    needs: build-4_5_0
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.5.1'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_5_2:
    needs: build-4_5_1
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.5.2'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write

  build-4_5_3:
    needs: build-4_5_2
    uses: ./.github/workflows/build-portable-r.yml
    with:
      r_version: '4.5.3'
      include_rtools: ${{ github.event.inputs.include_rtools == 'true' }}
    permissions:
      contents: write
