name: Build All R Versions

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'Comma-separated R versions (or "all" for 4.3.0-4.5.3)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run: build and test but do not create releases'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.versions }}"
          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            VERSIONS='["4.3.0","4.3.1","4.3.2","4.3.3","4.4.0","4.4.1","4.4.2","4.4.3","4.5.0","4.5.1","4.5.2","4.5.3"]'
          else
            VERSIONS=$(echo "$INPUT" | jq -R 'split(",") | map(gsub("\\s";""))')
          fi
          echo "matrix={\"r_version\":$VERSIONS}" >> $GITHUB_OUTPUT
          echo "Building versions: $VERSIONS"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, aarch64]
        r_version: ${{ fromJson(needs.prepare.outputs.matrix).r_version }}
        include:
          - arch: x64
            runner: windows-latest
          - arch: aarch64
            runner: windows-11-arm
        # ARM64 builds only available for 4.4.0 through 4.5.2
        exclude:
          - arch: aarch64
            r_version: "4.3.0"
          - arch: aarch64
            r_version: "4.3.1"
          - arch: aarch64
            r_version: "4.3.2"
          - arch: aarch64
            r_version: "4.3.3"
          - arch: aarch64
            r_version: "4.5.3"

    steps:
      - uses: actions/checkout@v6

      - name: Build portable R ${{ matrix.r_version }} (${{ matrix.arch }})
        shell: pwsh
        run: |
          .\build.ps1 -RVersion "${{ matrix.r_version }}" -Architecture "${{ matrix.arch }}"

      - name: Test portable R ${{ matrix.r_version }} (${{ matrix.arch }})
        shell: pwsh
        run: |
          .\tests\run-tests.ps1 "portable-r-${{ matrix.r_version }}-win-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: portable-r-${{ matrix.r_version }}-win-${{ matrix.arch }}
          path: |
            portable-r-*-win-${{ matrix.arch }}.zip
            portable-r-*-win-${{ matrix.arch }}.zip.sha256

  release:
    needs: [prepare, build]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r_version: ${{ fromJson(needs.prepare.outputs.matrix).r_version }}
    permissions:
      contents: write

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: portable-r-${{ matrix.r_version }}-win-x64
          path: artifacts/

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: portable-r-${{ matrix.r_version }}-win-aarch64
          path: artifacts/

      - name: Generate release body
        run: |
          V="${{ matrix.r_version }}"
          HAS_ARM64=false
          if [ -f "artifacts/portable-r-${V}-win-aarch64.zip" ]; then
            HAS_ARM64=true
          fi

          X64_SHA=$(cut -d' ' -f1 "artifacts/portable-r-${V}-win-x64.zip.sha256" 2>/dev/null || echo "n/a")
          if [ "$HAS_ARM64" = "true" ]; then
            ARM_SHA=$(cut -d' ' -f1 "artifacts/portable-r-${V}-win-aarch64.zip.sha256" 2>/dev/null || echo "n/a")
          fi

          {
            echo "## Portable R ${V} for Windows"
            echo ""
            echo "### Downloads"
            echo "| Architecture | File | SHA256 |"
            echo "|-------------|------|--------|"
            echo "| Windows x64 | \`portable-r-${V}-win-x64.zip\` | \`${X64_SHA}\` |"
            if [ "$HAS_ARM64" = "true" ]; then
              echo "| Windows ARM64 | \`portable-r-${V}-win-aarch64.zip\` | \`${ARM_SHA}\` |"
            fi
            echo ""
            echo "### Quick Install"
            echo ""
            echo "**x64**"
            echo ""
            echo "PowerShell:"
            echo "\`\`\`powershell"
            echo "Invoke-WebRequest -Uri \"https://github.com/portable-r/portable-r-windows/releases/download/v${V}/portable-r-${V}-win-x64.zip\" -OutFile portable-r.zip"
            echo "Expand-Archive portable-r.zip -DestinationPath ."
            echo "\`\`\`"
            echo ""
            echo "curl:"
            echo "\`\`\`cmd"
            echo "curl -fSLO https://github.com/portable-r/portable-r-windows/releases/download/v${V}/portable-r-${V}-win-x64.zip"
            echo "tar -xf portable-r-${V}-win-x64.zip"
            echo "\`\`\`"
            if [ "$HAS_ARM64" = "true" ]; then
              echo ""
              echo "**ARM64**"
              echo ""
              echo "PowerShell:"
              echo "\`\`\`powershell"
              echo "Invoke-WebRequest -Uri \"https://github.com/portable-r/portable-r-windows/releases/download/v${V}/portable-r-${V}-win-aarch64.zip\" -OutFile portable-r.zip"
              echo "Expand-Archive portable-r.zip -DestinationPath ."
              echo "\`\`\`"
              echo ""
              echo "curl:"
              echo "\`\`\`cmd"
              echo "curl -fSLO https://github.com/portable-r/portable-r-windows/releases/download/v${V}/portable-r-${V}-win-aarch64.zip"
              echo "tar -xf portable-r-${V}-win-aarch64.zip"
              echo "\`\`\`"
              echo ""
              echo "> **Note:** CRAN does not yet distribute binary R packages for Windows ARM64."
              echo "> Packages must be installed from source (\`type = \"source\"\`) or run under x64 emulation."
            fi
            echo ""
            echo "### Usage"
            echo "\`\`\`cmd"
            echo "portable-r-${V}-win-x64\\bin\\Rscript.exe my_script.R"
            echo "\`\`\`"
            echo "No installation required. Packages install to the local \`library\\\` directory."
          } > release-body.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.r_version }}
          name: R ${{ matrix.r_version }}
          files: artifacts/*
          body_path: release-body.md
